name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            BASE_DIR=${{ secrets.DEPLOY_BASE_DIR }}
            cd "$BASE_DIR/douglas-barbearia"
            git pull
            cd "$BASE_DIR/barbearia-front"
            git pull
            cd "$BASE_DIR/douglas-barbearia"
            docker compose -f docker-compose.deploy.yml up -d --build --no-deps frontend
